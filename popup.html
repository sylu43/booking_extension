<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Automation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      font-size: 13px;
      width: 340px;
      padding: 14px;
      background: #f7f9fc;
      color: #333;
    }

    h2 {
      font-size: 15px;
      margin-bottom: 12px;
      color: #1a73e8;
    }

    .field {
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-bottom: 3px;
      font-weight: bold;
      font-size: 12px;
      color: #555;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row .field {
      flex: 1;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 7px 10px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      font-weight: bold;
    }

    #authenticate {
      background: #fff;
      border: 1px solid #1a73e8;
      color: #1a73e8;
    }

    #run {
      background: #1a73e8;
      color: #fff;
    }

    #run:disabled,
    #authenticate:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      padding: 7px 10px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
      line-height: 1.5;
      white-space: pre-line;
    }

    #status.info    { background: #e8f0fe; color: #174ea6; display: block; }
    #status.success { background: #e6f4ea; color: #137333; display: block; }
    #status.warning { background: #fef7e0; color: #7d5504; display: block; }
    #status.error   { background: #fce8e6; color: #c5221f; display: block; }

    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .checkbox-field input[type="checkbox"] {
      width: auto;
      margin: 0;
    }

    .checkbox-field label {
      display: inline;
      margin: 0;
      font-weight: normal;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <h2>🏨 Booking Automation</h2>

  <div class="field">
    <label for="sourceSheetId">Source Reservations – Google Sheet ID <span style="color:red">*</span></label>
    <input type="text" id="sourceSheetId" placeholder="Sheet ID containing reservations" />
  </div>

  <div class="field">
    <label for="sourceRange">Source Sheet Range</label>
    <input type="text" id="sourceRange" placeholder="e.g. Sheet1!A2:D" value="Sheet1!A2:D" />
    <p class="hint">Columns: Name | Check-in | Check-out | Room (optional)</p>
  </div>

  <div class="field">
    <label for="targetSheetId">Target Google Sheet ID <span style="color:red">*</span></label>
    <input type="text" id="targetSheetId" placeholder="Sheet ID to write the calendar" />
  </div>

  <div class="checkbox-field">
    <input type="checkbox" id="autoRearrange" />
    <label for="autoRearrange">Auto-rearrange rooms when new reservations don't fit</label>
  </div>

  <div class="btn-row">
    <button id="authenticate">🔑 Sign in</button>
    <button id="run">▶ Run</button>
  </div>

  <div id="status"></div>

  <script src="xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
