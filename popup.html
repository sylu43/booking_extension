<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Automation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      font-size: 13px;
      width: 340px;
      padding: 14px;
      background: #f7f9fc;
      color: #333;
    }

    h2 {
      font-size: 15px;
      margin-bottom: 12px;
      color: #1a73e8;
    }

    .field {
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-bottom: 3px;
      font-weight: bold;
      font-size: 12px;
      color: #555;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row .field {
      flex: 1;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      padding: 7px 10px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      font-weight: bold;
    }

    #authenticate {
      background: #fff;
      border: 1px solid #1a73e8;
      color: #1a73e8;
    }

    #run {
      background: #1a73e8;
      color: #fff;
    }

    #run:disabled,
    #authenticate:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      margin-top: 10px;
      padding: 7px 10px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
      line-height: 1.5;
    }

    #status.info    { background: #e8f0fe; color: #174ea6; display: block; }
    #status.success { background: #e6f4ea; color: #137333; display: block; }
    #status.warning { background: #fef7e0; color: #7d5504; display: block; }
    #status.error   { background: #fce8e6; color: #c5221f; display: block; }

    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <h2>🏨 Booking Automation</h2>

  <div class="field">
    <label for="sourceSheetId">Phone Reservations – Google Sheet ID</label>
    <input type="text" id="sourceSheetId" placeholder="(optional) Sheet ID for phone bookings" />
    <p class="hint">Leave blank to use only booking.com data</p>
  </div>

  <div class="field">
    <label for="sourceRange">Phone Sheet Range</label>
    <input type="text" id="sourceRange" placeholder="e.g. Sheet1!A2:D" value="Sheet1!A2:D" />
    <p class="hint">Columns: Name | Check-in | Check-out | Room (optional)</p>
  </div>

  <div class="field">
    <label for="targetSheetId">Target Google Sheet ID <span style="color:red">*</span></label>
    <input type="text" id="targetSheetId" placeholder="Sheet ID to write the calendar" />
  </div>

  <div class="row">
    <div class="field">
      <label for="month">Month</label>
      <select id="month">
        <option value="1">January</option>
        <option value="2">February</option>
        <option value="3">March</option>
        <option value="4">April</option>
        <option value="5">May</option>
        <option value="6">June</option>
        <option value="7">July</option>
        <option value="8">August</option>
        <option value="9">September</option>
        <option value="10">October</option>
        <option value="11">November</option>
        <option value="12">December</option>
      </select>
    </div>
    <div class="field">
      <label for="year">Year</label>
      <input type="number" id="year" min="2020" max="2099" step="1" />
    </div>
  </div>

  <div class="btn-row">
    <button id="authenticate">🔑 Sign in</button>
    <button id="run">▶ Run</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
